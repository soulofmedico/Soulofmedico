<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Professional NEET preparation app with video lectures and admin panel">
    <title>Soul of Medico - Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='80' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>📚</text></svg>">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='80' fill='white' text-anchor='middle' dominant-baseline='central' font-weight='bold'>📚</text></svg>">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-card.dark-mode {
            background: #1a1f3a;
            color: #fff;
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
        }

        .login-card.dark-mode .login-title {
            color: #fff;
        }

        .login-subtitle {
            font-size: 14px;
            color: #999;
        }

        .login-card.dark-mode .login-subtitle {
            color: #aaa;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .login-card.dark-mode .login-tabs {
            border-bottom: 2px solid #333;
        }

        .login-tab {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #999;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }

        .login-tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .login-tab-content {
            display: none;
        }

        .login-tab-content.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #333;
            font-size: 14px;
        }

        .login-card.dark-mode .form-label {
            color: #fff;
        }

        .form-input {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            background: white;
            color: #333;
        }

        .login-card.dark-mode .form-input {
            background: #2a2f4a;
            border-color: #3a3f5a;
            color: #fff;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-input::placeholder {
            color: #bbb;
        }

        .login-card.dark-mode .form-input::placeholder {
            color: #888;
        }

        .error-message {
            color: #ef4444;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider {
            margin: 30px 0;
            text-align: center;
            color: #999;
            font-size: 13px;
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e0e0e0;
        }

        .login-card.dark-mode .divider {
            color: #aaa;
        }

        .login-card.dark-mode .divider::before {
            background: #333;
        }

        .divider-text {
            position: relative;
            background: white;
            padding: 0 10px;
            display: inline-block;
        }

        .login-card.dark-mode .divider-text {
            background: #1a1f3a;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .social-btn {
            padding: 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            font-size: 13px;
            color: #333;
        }

        .login-card.dark-mode .social-btn {
            border-color: #3a3f5a;
            background: #2a2f4a;
            color: #fff;
        }

        .social-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }

        .checkbox-input {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-label {
            font-size: 13px;
            color: #666;
            cursor: pointer;
        }

        .login-card.dark-mode .checkbox-label {
            color: #aaa;
        }

        .signup-link {
            text-align: center;
            font-size: 13px;
            color: #999;
            margin-top: 20px;
        }

        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .success-message {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            color: #166534;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 13px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .login-card.dark-mode .success-message {
            background: #1a3a1a;
            border-color: #4ade80;
            color: #86efac;
        }

        .terms-text {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-top: 20px;
        }

        .login-card.dark-mode .terms-text {
            color: #aaa;
        }

        .terms-text a {
            color: #667eea;
            text-decoration: none;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px 0;
        }

        .spinner {
            border: 3px solid #f0f0f0;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
            }

            .login-title {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-card">
        <!-- Header -->
        <div class="login-header">
            <div class="login-logo">🔬</div>
            <div class="login-title">Soul of Medico</div>
            <div class="login-subtitle">Mission MBBS Batch</div>
        </div>

        <!-- Success Message -->
        <div class="success-message" id="successMessage"></div>

        <!-- Tabs -->
        <div class="login-tabs">
            <button class="login-tab active" onclick="switchTab('emailTab')">
                📧 Email
            </button>
            <button class="login-tab" onclick="switchTab('phoneTab')">
                📱 Phone
            </button>
        </div>

        <!-- EMAIL LOGIN TAB -->
        <div class="login-tab-content active" id="emailTab">
            <form onsubmit="loginWithEmail(event)">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input 
                        type="email" 
                        class="form-input" 
                        id="emailInput" 
                        placeholder="your@email.com"
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input 
                        type="password" 
                        class="form-input" 
                        id="passwordInput" 
                        placeholder="Your password"
                        required
                    >
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="rememberMe" class="checkbox-input">
                    <label for="rememberMe" class="checkbox-label">Remember me</label>
                </div>

                <div class="loading" id="emailLoading">
                    <div class="spinner"></div>
                </div>

                <button type="submit" class="login-btn" id="emailLoginBtn">Sign In</button>
            </form>

            <div class="divider">
                <span class="divider-text">or</span>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="loginWithGoogle()">
                    🔵 Google
                </button>
                <button class="social-btn" onclick="loginWithGithub()">
                    🖤 GitHub
                </button>
            </div>

            <div class="signup-link">
                Don't have an account? <a onclick="switchTab('signup')">Sign up</a>
            </div>
        </div>

        <!-- PHONE LOGIN TAB -->
        <div class="login-tab-content" id="phoneTab">
            <form onsubmit="loginWithPhone(event)">
                <div class="form-group">
                    <label class="form-label">Phone Number</label>
                    <div style="display: flex; gap: 10px;">
                        <input 
                            type="text" 
                            class="form-input" 
                            value="+91" 
                            style="flex: 0 0 70px;"
                            disabled
                        >
                        <input 
                            type="tel" 
                            class="form-input" 
                            id="phoneInput" 
                            placeholder="10 digit number"
                            maxlength="10"
                            pattern="[0-9]{10}"
                            required
                        >
                    </div>
                    <div class="error-message" id="phoneError"></div>
                </div>

                <div class="form-group" id="otpGroup" style="display: none;">
                    <label class="form-label">Enter OTP</label>
                    <input 
                        type="text" 
                        class="form-input" 
                        id="otpInput" 
                        placeholder="6-digit OTP"
                        maxlength="6"
                        pattern="[0-9]{6}"
                    >
                    <div style="font-size: 12px; color: #999; margin-top: 8px;">
                        OTP sent to +91-XXXX-XXXX<span id="otpTimer"></span>
                    </div>
                    <div class="error-message" id="otpError"></div>
                </div>

                <div class="loading" id="phoneLoading">
                    <div class="spinner"></div>
                </div>

                <button type="submit" class="login-btn" id="phoneLoginBtn">Send OTP</button>
            </form>

            <div class="divider">
                <span class="divider-text">or</span>
            </div>

            <div class="social-login">
                <button class="social-btn" onclick="loginWithGoogle()" style="grid-column: 1/-1;">
                    🔵 Continue with Google
                </button>
            </div>
        </div>

        <!-- Terms -->
        <div class="terms-text">
            By signing in, you agree to our<br>
            <a href="#">Terms & Conditions</a> and <a href="#">Privacy Policy</a>
        </div>
    </div>
</div>

<script src="login.js"></script>
<script>
// Register Service Worker for offline support and PWA installation
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
        .then(registration => {
            console.log('✅ Service Worker registered successfully:', registration);
        })
        .catch(error => {
            console.log('⚠️ Service Worker registration failed:', error);
        });
}

// Check if app is running as PWA (installed)
let isAppInstalled = false;
if (window.navigator.standalone === true) {
    isAppInstalled = true;
    console.log('📱 Running as PWA/Standalone App');
}
</script>
</body>
</html>
